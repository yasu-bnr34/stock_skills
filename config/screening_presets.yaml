presets:
  value:
    description: "伝統的バリュー投資（低PER・低PBR）"
    criteria:
      max_per: 15
      max_pbr: 1.5
      min_dividend_yield: 0.02
      min_roe: 0.05

  high-dividend:
    description: "高配当株（配当利回り3%以上）"
    criteria:
      min_dividend_yield: 0.03
      max_per: 20
      min_roe: 0.05

  growth:
    description: "純成長株（高ROE・高成長、割安制約なし）"
    mode: "growth"
    criteria:
      min_roe: 0.15
      min_revenue_growth: 0.05
      min_earnings_growth: 0.10
      min_market_cap: 100000000000

  growth-value:
    description: "成長バリュー（成長性＋割安度）"
    criteria:
      max_per: 20
      min_roe: 0.10
      min_revenue_growth: 0.05

  deep-value:
    description: "ディープバリュー（非常に低いPER/PBR）"
    criteria:
      max_per: 8
      max_pbr: 0.5

  quality:
    description: "クオリティバリュー（高ROE＋割安）"
    criteria:
      max_per: 15
      max_pbr: 1.5
      min_roe: 0.15
      min_dividend_yield: 0.02

  pullback:
    description: "押し目買い型（上昇トレンド中の一時調整）"
    mode: "pullback"
    criteria:
      max_per: 20
      min_roe: 0.08
      min_revenue_growth: 0.05

  alpha:
    description: "アルファシグナル（割安＋変化の質＋押し目）"
    mode: "alpha"

  trending:
    description: "Xトレンド銘柄（SNSで話題の銘柄をファンダメンタルズ評価）"
    mode: "trending"

  shareholder-return:
    description: "高還元銘柄（配当+自社株買い5%以上）"
    criteria:
      min_total_shareholder_return: 0.05
      max_per: 20
      min_roe: 0.08

  high-growth:
    description: "高成長株（利益不問・売上急成長・PSRでバブル防止）"
    criteria:
      min_revenue_growth: 0.20           # 売上成長率 >= 20% (YoY)
      min_quarterly_revenue_growth: 0.10  # 直近四半期売上成長率 >= 10%
      max_psr: 20.0                       # PSR <= 20（バブル防止）
      min_gross_margin: 0.20              # 粗利率 >= 20%（最低限の事業性）

  small-cap-growth:
    description: "小型急成長株（時価総額1000億以下・売上急成長・10倍株候補）"
    criteria:
      min_revenue_growth: 0.20           # 売上成長率 >= 20% (YoY)
      min_quarterly_revenue_growth: 0.10  # 直近四半期売上成長率 >= 10%
      max_psr: 15.0                       # PSR <= 15（high-growth の 20 より厳しい）
      min_gross_margin: 0.20              # 粗利率 >= 20%
      max_market_cap: 100000000000        # 時価総額 <= 1000億円（JPY基準、他地域は自動調整）

  contrarian:
    description: "逆張り候補（テクニカル売られすぎ × ファンダ堅調）"
    mode: "contrarian"
    criteria:
      max_per: 15
      max_pbr: 1.5
      min_roe: 0.03

  momentum:
    description: "モメンタム（急騰・ブレイクアウト検出）"
    mode: "momentum"
    criteria:
      min_52wk_change: 0.20
      min_market_cap: 50000000000

  surge:
    description: "急騰株（当日+3%以上・出来高2倍以上の短期急騰を検出）"
    mode: "surge"
    criteria:
      min_market_cap: 10000000000
      min_avg_volume_3m: 100000

  long-term:
    description: "長期投資適性（高ROE・EPS成長・高配当・安定企業）"
    criteria:
      max_per: 25
      max_pbr: 3.0
      min_roe: 0.15
      min_dividend_yield: 0.02
      min_earnings_growth: 0.10
      min_market_cap: 100000000000

  market-darling:
    description: "市場期待銘柄（高PER許容・EPS急成長・大型）"
    criteria:
      min_per: 30
      min_earnings_growth: 0.30
      min_revenue_growth: 0.15
      max_psr: 30.0
      min_gross_margin: 0.20
      min_market_cap: 50000000000
